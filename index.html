<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Fish Cinema</title>

<style>
body{
  margin:0;
  font-family:Georgia, serif;
  background:#1a1208;
  color:#f5e6c4;
  display:flex;
}

/* ===== ЛЕВАЯ ПАНЕЛЬ ===== */
.sidebar{
  width:260px;
  background:#2c1c0e;
  padding:20px;
  height:100vh;
  overflow-y:auto;
  border-right:3px solid #d4af37;
}

.sidebar h3{
  color:#d4af37;
  margin-top:20px;
}

.sidebar button{
  display:block;
  width:100%;
  margin:5px 0;
  background:none;
  border:none;
  color:#ffd700;
  text-align:left;
  cursor:pointer;
}

.sidebar button:hover{
  color:white;
}

/* ===== ПРАВАЯ ЧАСТЬ ===== */
.main{
  flex:1;
  padding:20px;
}

/* ===== СПИСОК ФИЛЬМОВ ===== */
.movie-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,200px);
  gap:20px;
}

.movie-card img{
  width:200px;
  height:300px;
  object-fit:cover;
  border:3px solid #d4af37;
  cursor:pointer;
}

/* ===== СТРАНИЦА ФИЛЬМА ===== */
.movie-page{
  display:flex;
  gap:30px;
}

.movie-page img{
  width:300px;
  height:450px;
  object-fit:cover;
  border:4px solid #d4af37;
}

.movie-info{
  max-width:600px;
}

.description{
  margin-top:20px;
  max-height:450px;      /* не выходит ниже картинки */
  overflow:auto;         /* если текст длинный — появится прокрутка */
}
</style>
</head>
<body>

<div class="sidebar">

<h2>🎬 Категории</h2>

<h3>Жанры</h3>
<button onclick="filterGenre('all')">Все фильмы</button>
<button onclick="filterGenre('Вестерн')">Вестерн</button>
<button onclick="filterGenre('Драма')">Драма</button>
<button onclick="filterGenre('Криминал')">Криминал</button>
<button onclick="filterGenre('Триллер')">Триллер</button>

<h3>Годы</h3>
<button onclick="filterYear(1964)">1964</button>
<button onclick="filterYear(1966)">1966</button>
<button onclick="filterYear(1976)">1976</button>
<button onclick="filterYear(2007)">2007</button>

<h3>По странам</h3>
<button onclick="filterCountry('Италия')">Италия</button>
<button onclick="filterCountry('США')">США</button>

</div>

<div class="main">
<div id="content"></div>
</div>

<script>

const movies = [
{
title:"За пригоршню долларов",
original:"A Fistful of Dollars",
year:1964,
genre:["Вестерн"],
country:"Италия",
director:"Серджио Леоне",
actors:"Клинт Иствуд",
poster:"https://m.media-amazon.com/images/I/71C1g9gF9ZL._AC_SY679_.jpg",
description:"Одинокий стрелок приезжает в маленький городок и играет на конфликте двух банд."
},
{
title:"Хороший, плохой, злой",
original:"The Good, the Bad and the Ugly",
year:1966,
genre:["Вестерн"],
country:"Италия",
director:"Серджио Леоне",
actors:"Клинт Иствуд, Илай Уоллак",
poster:"https://m.media-amazon.com/images/I/81XnYB1KkDL._AC_SY679_.jpg",
description:"Три охотника за сокровищами ищут золото во время гражданской войны."
},
{
title:"Taxi Driver",
original:"Taxi Driver",
year:1976,
genre:["Драма","Криминал"],
country:"США",
director:"Мартин Скорсезе",
actors:"Роберт Де Ниро",
poster:"https://m.media-amazon.com/images/I/71ZxE3WQpFL._AC_SY679_.jpg",
description:"Таксист-ветеран Вьетнама постепенно теряет связь с реальностью."
},
{
title:"Старикам тут не место",
original:"No Country for Old Men",
year:2007,
genre:["Триллер","Криминал"],
country:"США",
director:"Братья Коэн",
actors:"Хавьер Бардем",
poster:"https://m.media-amazon.com/images/I/81WCNkLQ6-L._AC_SY679_.jpg",
description:"Обычный человек находит чемодан с деньгами и становится мишенью убийцы."
}
];

function showMovies(list){
  const content = document.getElementById("content");
  content.innerHTML = '<div class="movie-grid"></div>';
  const grid = document.querySelector(".movie-grid");

  list.forEach(movie=>{
    const card = document.createElement("div");
    card.className="movie-card";
    card.innerHTML=`<img src="${movie.poster}" onclick='openMovie(${JSON.stringify(movie)})'>`;
    grid.appendChild(card);
  });
}

function openMovie(movie){
  const content = document.getElementById("content");
  content.innerHTML = `
  <div class="movie-page">
    <img src="${movie.poster}">
    <div class="movie-info">
      <h2>${movie.title}</h2>
      <p><b>Оригинальное название:</b> ${movie.original}</p>
      <p><b>Год:</b> ${movie.year}</p>
      <p><b>Жанр:</b> ${movie.genre.join(", ")}</p>
      <p><b>Страна:</b> ${movie.country}</p>
      <p><b>Режиссер:</b> ${movie.director}</p>
      <p><b>Актеры:</b> ${movie.actors}</p>

      <div class="description">
        <h3>Описание</h3>
        <p>${movie.description}</p>
      </div>
    </div>
  </div>
  `;
}

function filterGenre(genre){
  if(genre==="all") showMovies(movies);
  else showMovies(movies.filter(m=>m.genre.includes(genre)));
}

function filterYear(year){
  showMovies(movies.filter(m=>m.year===year));
}

function filterCountry(country){
  showMovies(movies.filter(m=>m.country===country));
}

showMovies(movies);

</script>

</body>
</html>

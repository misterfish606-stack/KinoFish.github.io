<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Fish Cinema</title>

<style>
body.movie-title{
    position:relative;
    color:#ffd700;
    font-size:18px;
    cursor:pointer;
    display:inline-block;
}

.movie-title::after{
    content:"";
    position:absolute;
    left:0;
    bottom:-4px;
    width:0;
    height:2px;
    background:#ffd700;
    transition:0.4s ease;
}

.movie-title:hover::after{
    width:100%;
}


/* ===== Верхнее меню ===== */
.top-menu{
    background:#2c1c0e;
    padding:15px;
    display:flex;
    gap:30px;
    justify-content:center;
}

.top-menu a{
    color:#ffd700;
    text-decoration:none;
    font-size:18px;
}

.top-menu a:hover{
    text-decoration:underline;
}

/* ===== Основной блок ===== */
.main{
    display:flex;
}

/* ===== Левая панель ===== */
.sidebar{
    width:22%;
    background:#2c1c0e;
    padding:20px;
    overflow-y:auto;
    height:100vh;
}

.sidebar h3{
    color:#d4af37;
}

.sidebar a{
    display:block;
    color:#f5e6c4;
    text-decoration:none;
    margin:4px 0;
}

.sidebar a:hover{
    color:#ffd700;
}

/* ===== Каталог ===== */
.catalog{
    width:78%;
    padding:30px;
}

/* ===== Карточка фильма ===== */
.movie-item{
    display:flex;
    gap:20px;
    margin-bottom:40px;
}

.movie-item img{
    width:220px;
    height:320px;
    object-fit:cover;
    border:4px solid #d4af37;
}

.movie-info{
    width:220px; 
    height:320px;
    overflow:hidden;
}

.meta{
    font-size:13px;
    line-height:1.3em;
    max-height:180px;
    overflow:hidden;
}

.description-text{
    font-size:12px;
    max-height:90px;
    overflow:hidden;
}


/* Ссылка */
.movie-item a{
    text-decoration:none;
    color:inherit;
    display:flex;
    gap:20px;
}
</style>
</head>

<body>

<!-- ===== Верх ===== -->
<div class="top-menu">
    <a href="#" onclick="showAll()">Фильмы</a>
    <a href="#">Поиск</a>
    <a href="#" onclick="showNew()">Новинки</a>
    <a href="#">Подборки</a>
</div>

<div class="main">

<!-- ===== Левая панель ===== -->
<div class="sidebar">

<h3>Года</h3>
<div id="years"></div>

<h3>Страны</h3>
<a href="#" onclick="filterCountry('США')">США</a>
<a href="#" onclick="filterCountry('Испания')">Испания</a>
<a href="#" onclick="filterCountry('Великобритания')">Великобритания</a>
<a href="#" onclick="filterCountry('Италия')">Италия</a>
<a href="#" onclick="filterCountry('Германия')">Германия</a>
<a href="#" onclick="filterCountry('Франция')">Франция</a>
<a href="#" onclick="filterCountry('Канада')">Канада</a>
<a href="#" onclick="filterCountry('Мексика')">Мексика</a>

</div>

<!-- ===== Каталог ===== -->
<div class="catalog" id="catalog"></div>

</div>

<script>

/* ===== Автогенерация годов ===== */
const yearContainer = document.getElementById("years");
for(let y=1964;y<=2026;y++){
    yearContainer.innerHTML += 
    `<a href="#" onclick="filterYear(${y})">${y}</a>`;
}

/* ===== База фильмов ===== */

},

{
<div class="movie-item">

<a href="fight_club.html">

<div class="movie-info">

<div class="meta">

{
title:"Таксист",
file:"taxi_driver_1976.html",

country:"США",
desc:"Одинокий ветеран становится свидетелем упадка Нью-Йорка.",

},

{

year:1965,
country:"Испания",

{

year:2005,
country:"Великобритания",

img:"https://static.hdrezka.ac/i/2014/1/28/nec0c4b76dd99cm66u83v.jpg"
}

];

/* ===== Вывод ===== */
function render(list){
const catalog=document.getElementById("catalog");
catalog.innerHTML="";
list.forEach(m=>{
catalog.innerHTML+=`
<div class="movie-item">
<a href="${m.file}">
<img src="${m.img}">
<div class="movie-info">
<p>${m.title}</p>
<div class="meta">
Год: ${m.year}<br>
Страна: ${m.country}
</div>
<div class="description">
${m.desc}
</div>
</div>
</a>
</div>
`;
});
}

render(movies);

/* ===== Фильтры ===== */
function filterYear(y){
render(movies.filter(m=>m.year==y));
}

function filterCountry(c){
render(movies.filter(m=>m.country==c));
}

function showAll(){
render(movies);
}

function showNew(){
render(movies.filter(m=>m.file=="fight_club.html"));
}

</script>

</body>
</html>
